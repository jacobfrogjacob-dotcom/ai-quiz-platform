<title>AI 無限題庫</title>
<script>
// In-app browser detection
(function(){
  const ua = navigator.userAgent.toLowerCase();
  const isInApp = /line|fb_iab|fban|fbav|instagram|kakaotalk|twitter for iphone|twitter for android/i.test(ua);
  if (isInApp) {
    document.documentElement.innerHTML = `
      <style>
        body { font-family: 'Noto Sans TC', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f6f7f9; text-align: center; padding: 20px; }
        .card { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,.1); max-width: 360px; }
        h2 { font-size: 1.25rem; margin-bottom: 8px; }
        p { font-size: .875rem; color: #666; line-height: 1.6; }
        .btn { display: inline-block; margin-top: 16px; padding: 12px 24px; background: #0B5EAC; color: #fff; border-radius: 20px; text-decoration: none; font-weight: 600; font-size: .9375rem; }
      </style>
      <div class="card">
        <div style="font-size:3rem;margin-bottom:12px">🌐</div>
        <h2>請使用 Chrome 開啟</h2>
        <p>為獲得最佳體驗，請點右上角「⋯」<br>選擇「在 Chrome 中開啟」</p>
        <a class="btn" href="intent://${window.location.host}${window.location.pathname}#Intent;scheme=https;package=com.android.chrome;end">開啟 Chrome</a>
      </div>`;
  }
})();
</script>

</script>

<!-- ===== Chart.js ===== -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js">
</script>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js">
</script>

<!-- ===== TaipeiSansTC (CDN) or fallback ===== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   FONT: Noto Sans TC（繁體黑體，非楷書）
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }

:root {
  --font: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  --primary: #0B5EAC;
  --primary-dark: #094d91;
  --primary-light: #E8F0FE;
  --primary-hover: #72A0CB;
  --success: #16A34A;
  --success-light: #DCFCE7;
  --danger: #DC2626;
  --danger-light: #FEE2E2;
  --warning: #D97706;
  --warning-light: #FEF3C7;
  --gray-50: #F6F7F9;
  --gray-100: #EEEFF2;
  --gray-200: #D9D9D9;
  --gray-300: #C4C4C4;
  --gray-400: #9CA3AF;
  --gray-500: #6B6B6B;
  --gray-600: #4B5563;
  --gray-700: #374151;
  --gray-800: #1F2937;
  --gray-900: #191919;
  --radius: 16px;
  --radius-sm: 8px;
  --radius-pill: 20px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 0 40px rgba(25,25,25,.2);
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  padding-top: 64px;
  transition: background .3s, color .3s;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--primary);
  height: 64px;
}
.navbar-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center;
  padding: 8px 60px; height: 100%; gap: 8px;
}
@media (max-width: 768px) {
  .navbar-inner { padding: 8px 16px; }
}
.navbar-brand {
  display: flex; align-items: center; gap: 8px;
  font-size: 1.25rem; font-weight: 700; color: #fff;
  text-decoration: none; margin-right: auto;
  white-space: nowrap;
}
.navbar-brand svg { width: 28px; height: 28px; color: #fff; flex-shrink: 0; }
.nav-links { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
.nav-links::-webkit-scrollbar { display: none; }
.nav-link {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 14px; border-radius: var(--radius-sm);
  font-size: .875rem; font-weight: 500;
  color: rgba(255,255,255,.8); text-decoration: none;
  transition: all .15s; white-space: nowrap;
}
.nav-link:hover, .nav-link.active { background: rgba(255,255,255,.15); color: #fff; }
.nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }
.nav-user { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.nav-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  object-fit: cover; background: rgba(255,255,255,.2); cursor: pointer;
  border: 2px solid rgba(255,255,255,.3);
}
.nav-avatar-placeholder {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: .75rem; color: rgba(255,255,255,.7);
  border: 2px solid rgba(255,255,255,.3);
}

/* ===== MAIN CONTAINER ===== */
.container { max-width: 1000px; margin: 0 auto; padding: 32px 16px 80px; }

/* ===== PAGE SECTIONS ===== */
.page { display: none; animation: fadeIn .25s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ===== TYPOGRAPHY ===== */
h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 4px; }
h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 12px; }
h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
.text-sm { font-size: .875rem; }
.text-xs { font-size: .75rem; }
.text-muted { color: var(--gray-500); }
.text-center { text-align: center; }
.mb-2 { margin-bottom: 8px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }
.mb-8 { margin-bottom: 32px; }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mt-6 { margin-top: 24px; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.flex { display: flex; }
.flex-wrap { flex-wrap: wrap; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.justify-center { justify-content: center; }
.flex-1 { flex: 1; min-width: 0; }
.grid { display: grid; }
.grid-2 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
.grid-3 { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }

/* ===== CARDS ===== */
.card {
  background: #fff; border-radius: var(--radius);
  border: none;
  box-shadow: var(--shadow-lg);
  padding: 20px; transition: box-shadow .2s;
}
.card-hover:hover { box-shadow: 0 0 50px rgba(25,25,25,.25); }
.card-flat { border: none; box-shadow: none; }
.card-divider { border-top: 1px solid var(--gray-100); margin: 16px -20px; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 24px; border-radius: var(--radius-pill); font-size: .875rem; font-weight: 500;
  border: 1px solid transparent; cursor: pointer; transition: all .15s;
  font-family: var(--font); text-decoration: none; line-height: 1.8;
  white-space: nowrap; min-height: 40px;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover:not(:disabled) { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn-secondary { background: var(--gray-100); color: var(--gray-700); }
.btn-secondary:hover:not(:disabled) { background: var(--gray-200); }
.btn-outline {
  background: #fff; color: var(--primary);
  border: 1px solid var(--primary);
}
.btn-outline:hover:not(:disabled) { color: var(--primary-hover); border-color: var(--primary-hover); background: unset; }
.btn-success { background: var(--success); color: #fff; border-color: var(--success); }
.btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-sm { padding: 4px 16px; font-size: .8125rem; min-height: 32px; }
.btn-lg { padding: 14px 28px; font-size: 1rem; min-height: 48px; }
.btn-block { width: 100%; }
.btn-ghost { background: transparent; color: var(--gray-500); border-color: transparent; }
.btn-ghost:hover:not(:disabled) { background: var(--gray-100); color: var(--gray-700); }

/* ===== INPUTS ===== */
.input-group { margin-bottom: 16px; }
.input-label { display: block; font-size: .875rem; font-weight: 500; color: var(--gray-700); margin-bottom: 4px; }
.input, .textarea, .select {
  width: 100%; padding: 8px 14px; border: none;
  border-radius: var(--radius-sm); font-size: .875rem; font-family: var(--font);
  transition: all .15s; outline: none; background: var(--gray-50);
  color: var(--gray-900); min-height: 40px;
}
.input:focus, .textarea:focus, .select:focus { outline: 1px solid var(--primary); }
.textarea { resize: vertical; min-height: 100px; }
.input-error { outline: 1px solid var(--danger) !important; }
.input-help { font-size: .75rem; color: var(--gray-400); margin-top: 4px; }

/* ===== BADGES / TAGS ===== */
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 10px; border-radius: var(--radius-pill);
  font-size: .75rem; font-weight: 500;
}
.tag-blue { background: var(--primary-light); color: var(--primary); }
.tag-green { background: var(--success-light); color: var(--success); }
.tag-red { background: var(--danger-light); color: var(--danger); }
.tag-yellow { background: var(--warning-light); color: var(--warning); }
.tag-gray { background: var(--gray-50); color: var(--gray-500); }
.tag-sm { padding: 1px 8px; font-size: .6875rem; }

/* ===== LOADING ===== */
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--gray-200);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin .6s linear infinite; margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; padding: 60px 20px; color: var(--gray-500);
}

/* ===== PROGRESS BAR ===== */
.progress-bar {
  width: 100%; height: 8px; background: var(--gray-50);
  border-radius: var(--radius-pill); overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--primary); border-radius: var(--radius-pill);
  transition: width .3s ease;
}

/* ===== TOAST ===== */
.toast-container {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  z-index: 999; display: flex; flex-direction: column; gap: 8px;
  pointer-events: none; max-width: 90vw;
}
.toast {
  background: var(--gray-900); color: #fff; padding: 12px 20px;
  border-radius: 10px; font-size: .875rem; font-weight: 500;
  box-shadow: var(--shadow-lg); pointer-events: auto;
  animation: toastIn .25s ease; max-width: 420px;
}
.toast-success { background: var(--success); }
.toast-error { background: var(--danger); }
.toast-info { background: var(--primary); }
@keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } }

/* ===== HERO / LANDING ===== */
.hero { text-align: center; padding: 60px 0 40px; }
.hero h1 { font-size: 2.5rem; margin-bottom: 8px; }
.hero h1 span { color: var(--primary); }
.hero p { font-size: 1.1rem; color: var(--gray-500); max-width: 600px; margin: 0 auto 32px; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 14px; background: var(--primary-light);
  color: var(--primary); border-radius: 100px;
  font-size: .8125rem; font-weight: 600; margin-bottom: 20px;
}
.feature-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 16px; margin-top: 40px; }
.feature-card {
  background: #fff; border-radius: var(--radius); border: none;
  padding: 20px; text-align: center; transition: box-shadow .2s;
  box-shadow: var(--shadow-lg);
}
.feature-card:hover { box-shadow: 0 0 50px rgba(25,25,25,.25); }
.feature-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--primary-light); display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px;
}
.feature-icon svg { width: 22px; height: 22px; color: var(--primary); }
.feature-card h3 { font-size: .9375rem; margin-bottom: 4px; }
.feature-card p { font-size: .8125rem; color: var(--gray-500); }

/* ===== QUIZ ===== */
.quiz-source-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.source-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 18px; border-radius: var(--radius-pill); font-size: .9375rem; font-weight: 500;
  border: 1px solid var(--gray-200); cursor: pointer; transition: all .15s;
  font-family: var(--font); background: #fff; color: var(--gray-500);
}
.source-tab:hover { border-color: var(--primary); color: var(--primary); }
.source-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Question */
.question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.question-meta { font-size: .8125rem; color: var(--gray-500); }
.question-content { font-size: 1.05rem; line-height: 1.7; margin-bottom: 20px; }
.question-type-badge {
  display: inline-block; padding: 2px 10px; border-radius: 100px;
  font-size: .6875rem; font-weight: 600; margin-left: 8px;
  background: var(--gray-100); color: var(--gray-600);
}
.options-list { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; text-align: left; padding: 14px 16px;
  border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
  background: #fff; cursor: pointer; font-size: .875rem;
  font-family: var(--font); transition: all .15s;
}
.option-btn:hover:not(:disabled) { border-color: var(--primary); }
.option-btn.selected:not(.result-mode) { border-color: var(--primary); background: var(--primary-light); }
.option-btn.correct { border-color: var(--success); background: var(--success-light); }
.option-btn.wrong { border-color: var(--danger); background: var(--danger-light); }
.option-btn:disabled { cursor: default; }
.option-icon { width: 20px; height: 20px; flex-shrink: 0; }
.option-text { flex: 1; min-width: 0; }
.true-false-group { display: flex; gap: 12px; }
.true-false-group .option-btn { flex: 1; justify-content: center; }
.fill-input { width: 100%; padding: 12px 16px; border: none; border-radius: var(--radius-sm); font-size: .875rem; font-family: var(--font); outline: none; background: var(--gray-50); }
.fill-input:focus { outline: 1px solid var(--primary); }
.fill-input.correct { outline: 1px solid var(--success); background: var(--success-light); }
.fill-input.wrong { outline: 1px solid var(--danger); background: var(--danger-light); }

.explanation-box { padding: 16px; border-radius: var(--radius-sm); margin-top: 16px; font-size: .875rem; }
.explanation-box.correct { background: var(--success-light); border: 1px solid #BBF7D0; }
.explanation-box.wrong { background: var(--danger-light); border: 1px solid #FECACA; }
.explanation-box h4 { font-size: .8125rem; margin-bottom: 4px; }
.explanation-box p { color: var(--gray-600); }

/* ===== QUIZ NAV ===== */
.quiz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; gap: 12px; }
.question-dots { display: flex; gap: 4px; flex-wrap: wrap; }
.question-dot {
  width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--gray-200);
  display: flex; align-items: center; justify-content: center;
  font-size: .625rem; font-weight: 600; cursor: pointer;
  transition: all .15s; background: #fff; color: var(--gray-400);
}
.question-dot.active { border-color: var(--primary); background: var(--primary); color: #fff; }
.question-dot.answered { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight:700; }
.question-dot:hover:not(.active) { border-color: var(--gray-400); }

/* ===== RESULT ===== */
.result-hero { text-align: center; padding: 32px; }
.result-grade {
  width: 80px; height: 80px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; margin: 0 auto 16px;
  font-size: 2rem; font-weight: 700;
}
.result-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin: 20px 0; }

/* ===== LEADERBOARD ===== */
.leaderboard-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.lb-tab {
  padding: 8px 18px; border-radius: var(--radius-pill); font-size: .8125rem; font-weight: 500;
  border: 1px solid var(--gray-200); cursor: pointer; transition: all .15s;
  font-family: var(--font); background: #fff; color: var(--gray-500);
}
.lb-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.lb-entry { display: flex; align-items: center; gap: 12px; }
.lb-rank { width: 28px; text-align: center; font-weight: 700; font-size: .875rem; }
.lb-rank.gold { color: #EAB308; }
.lb-rank.silver { color: #9CA3AF; }
.lb-rank.bronze { color: #F97316; }

/* ===== ADMIN ===== */
.admin-section { margin-bottom: 32px; }
.toggle-switch {
  position: relative; width: 44px; height: 24px; flex-shrink: 0;
  background: var(--gray-300); border-radius: 100px; cursor: pointer;
  transition: background .2s; border: none;
}
.toggle-switch.on { background: var(--primary-hover); }
.toggle-switch::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 20px; height: 20px; background: #fff; border-radius: 50%;
  transition: transform .2s;
}
.toggle-switch.on::after { transform: translateX(20px); }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
.api-key-input { width: 100%; padding: 10px 14px; border: 2px solid var(--gray-200); border-radius: 10px; font-size: .8125rem; font-family: monospace; margin-bottom: 8px; }

/* ===== DASHBOARD ===== */
.chart-container { position: relative; height: 240px; width: 100%; }
.stat-card { text-align: center; padding: 16px; }
.stat-value { font-size: 1.75rem; font-weight: 700; line-height: 1.2; }
.stat-label { font-size: .75rem; color: var(--gray-500); margin-top: 2px; }

/* ===== PROFILE ===== */
.profile-avatar-lg { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; margin: 0 auto 12px; display: block; }

/* ===== TABLE ===== */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .875rem; }
th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--gray-100); }
th { color: var(--gray-500); font-weight: 500; font-size: .75rem; text-transform: uppercase; letter-spacing: .5px; }

/* ===== MARKDOWN CONTENT ===== */
.markdown-content { font-size: .875rem; line-height: 1.7; }
.markdown-content h1, .markdown-content h2, .markdown-content h3 { margin-top: 16px; margin-bottom: 8px; }
.markdown-content p { margin-bottom: 8px; color: var(--gray-600); }
.markdown-content ul, .markdown-content ol { padding-left: 20px; margin-bottom: 8px; }
.markdown-content li { margin-bottom: 4px; color: var(--gray-600); }
.markdown-content code { background: var(--gray-100); padding: 2px 6px; border-radius: 4px; font-size: .8125rem; }
.markdown-content blockquote {
  border-left: 3px solid var(--primary); padding-left: 12px;
  color: var(--gray-500); margin: 8px 0; font-style: italic;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .nav-links { gap: 0; }
  .nav-link { padding: 6px 8px; font-size: .8125rem; }
  .navbar-brand span { display: none; }
  .hero h1 { font-size: 1.75rem; }
  .result-stats { gap: 8px; }
  .stat-value { font-size: 1.25rem; }
  .grid-2 { grid-template-columns: 1fr; }
  .true-false-group { flex-direction: column; }
  .options-list { flex-direction: column; }
  .quiz-nav { flex-wrap: wrap; gap: 8px; justify-content: center; }
  .quiz-nav .btn { flex: 1; min-width: 100px; text-align: center; justify-content: center; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .table-wrap table { min-width: 420px; }
  .admin-section h2 { font-size: 1.1rem; }
  .api-key-input { font-size: .75rem; }
}
@media (max-width: 480px) {
  .container { padding: 16px 12px 80px; }
  .card { padding: 16px; }

<script>
/* ============================================================

const firebaseConfig = {

  appId: "1:539452268695:web:9d070fc61e717346a809d2",
  measurementId: "G-BX6XLQ8TS6"
};

/* ============================================================
   APP STATE
   ============================================================ */
const state = {
  user: null,
  profile: null,
  quizSession: null,
  quizAnswers: {},
  currentQIdx: 0,
  quizMode: 'idle', // idle | taking | reviewing
  dashboardChart: null,
  radarChart: null,
  diagnosisRadarChart: null,
  diagnosisBarChart: null,

};

/* ============================================================
   FIREBASE INIT
   ============================================================ */
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ============================================================
   UTILITY
   ============================================================ */
function $(id) { return document.getElementById(id); }
function qs(sel, ctx) { return (ctx || document).querySelector(sel); }
function qsa(sel, ctx) { return (ctx || document).querySelectorAll(sel); }

function uid() { return Math.random().toString(36).substr(2, 9) + Date.now().toString(36); }

function toast(msg, type, duration) {
  const c = $('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast toast-' + (type || 'info');
  el.textContent = msg;
  c.appendChild(el);
  const t = duration || 3000;
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, t);
}

function loading(show) { $('globalLoading').style.display = show ? 'flex' : 'none'; }

function formatDate(d) {
  if (!d) return '';
  const date = d.toDate ? d.toDate() : new Date(d);
  return date.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function shuffle(arr) { const a = [...arr]; for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; } return a; }

function accuracy(correct, total) { return total === 0 ? 0 : Math.round(correct/total*100); }

function formatScore(n) {
  if (n >= 1000) return (n/1000).toFixed(n%1000===0?0:1) + 'k';
  return String(n);
}

function cleanText(s) {
  if (!s) return '';
  return String(s).replace(/\$/g, '').replace(/\\\(/g, '').replace(/\\\)/g, '').replace(/\\\[/g, '').replace(/\\\]/g, '');
}

function playCorrectSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) { /* ignore audio errors */ }
}
function playWrongSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 330;
    osc.type = 'sawtooth';
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } catch(e) { /* ignore audio errors */ }
}

/* ============================================================
   GLOBAL REQUEST SLOT (3s gap + button lock)
   ============================================================ */
let _nextSlot = 0;
const SLOT_GAP = 3000;
const _slotBtnOrig = {};

function slotBtn(id) {
  const el = $(id);
  if (!el) return null;
  if (!_slotBtnOrig[id]) _slotBtnOrig[id] = el.innerHTML;
  return el;
}

async function acquireSlot(ids) {
  const btns = ids.map(id => slotBtn(id)).filter(Boolean);
  btns.forEach(b => { b.disabled = true; });

  const now = Date.now();
  let wait = _nextSlot - now;

  if (wait > 0) {
    const tick = () => {
      const rem = _nextSlot - Date.now();
      if (rem <= 0) return true;
      const s = Math.ceil(rem / 1000);
      btns.forEach(b => { b.innerHTML = `⏳ ${s} 秒`; });
      return false;
    };
    tick();
    await new Promise(resolve => {
      const id = setInterval(() => { if (tick()) { clearInterval(id); resolve(); } }, 200);
    });
  }
  _nextSlot = Date.now() + SLOT_GAP;
}

function releaseSlot(ids) {
  ids.forEach(id => {
    const el = $(id);
    if (el) {
      el.disabled = false;
      el.innerHTML = _slotBtnOrig[id] || el.innerHTML;
    }
  });
}

/* ============================================================
   DARK MODE
   ============================================================ */
function toggleDarkMode() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? '' : 'dark');
  localStorage.setItem('darkMode', isDark ? '0' : '1');
  $('darkModeToggle').textContent = isDark ? '🌙' : '☀️';
}
function initDarkMode() {
  if (localStorage.getItem('darkMode') === '1') {
    document.documentElement.setAttribute('data-theme', 'dark');
    $('darkModeToggle').textContent = '☀️';
  }
}

/* ============================================================
   ROUTER
   ============================================================ */
function navigate(page) {
  window.location.hash = page;
}

function handleRoute() {
  let hash = window.location.hash.replace('#', '') || 'home';
  if (!state.user && !['home','auth'].includes(hash)) { hash = 'home'; window.location.hash = 'home'; }
  qsa('.page').forEach(p => p.classList.remove('active'));
  const page = $('page-' + hash);
  if (page) page.classList.add('active');
  qsa('.nav-link').forEach(l => l.classList.toggle('active', l.dataset.page === hash));

  switch (hash) {
    case 'home': renderHome(); break;
    case 'quiz': renderQuiz(); break;
    case 'dashboard': renderDashboard(); break;
    case 'diagnosis': renderDiagnosis(); break;
    case 'notes': renderNotes(); break;
    case 'leaderboard': renderLeaderboard(); break;
    case 'admin': renderAdmin(); break;
    case 'profile': renderProfile(); break;
  }
}

window.addEventListener('hashchange', handleRoute);

/* ============================================================
   AUTH
   ============================================================ */
auth.onAuthStateChanged(async (user) => {
  const wasLoggedOut = !state.user && user;
  state.user = user;
  if (user) {
    if (!curriculumData || curriculumData.label === '課綱載入失敗') {
      await loadCurriculum();
    }
    await loadProfile(user.uid);
    await loadBookmarks();
    await updateStreak();
    if (wasLoggedOut) toast('登入成功！', 'success');
  } else {
    state.profile = null;
    state._bookmarked = {};
  }
  updateNav();
  handleRoute();
});

// Handle redirect result — critical for mobile redirect flow
auth.getRedirectResult().then((result) => {
  if (result.user && !state.user) {
    state.user = result.user;
    loadProfile(result.user.uid).then(() => {
      updateStreak();
      updateNav();
      handleRoute();
    });
    toast('登入成功！', 'success');
  }
}).catch((e) => {
  console.warn('Redirect result error:', e.code);
});

async function loadProfile(uid) {
  try {
    const doc = await db.collection('profiles').doc(uid).get();
    const isOwner = state.user.email === 'jacob.frog.jacob@gmail.com';
    if (doc.exists) {
      state.profile = { id: uid, ...doc.data() };
      if (isOwner && state.profile.role !== 'admin') {
        state.profile.role = 'admin';
        await db.collection('profiles').doc(uid).update({ role: 'admin' });
      }
    } else {
      const p = {
        email: state.user.email,
        nickname: state.user.displayName || state.user.email?.split('@')[0] || '用戶',
        fullName: state.user.displayName || '',
        avatarUrl: state.user.photoURL || '',
        role: isOwner ? 'admin' : 'user',
        streak: 0,
        lastActiveDate: '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      await db.collection('profiles').doc(uid).set(p);
      state.profile = { id: uid, ...p, createdAt: new Date() };
    }
  } catch(e) { console.error('loadProfile error:', e); }
}

async function updateProfile(data) {
  if (!state.user) return;
  try {
    await db.collection('profiles').doc(state.user.uid).update(data);
    Object.assign(state.profile, data);
  } catch(e) { console.error('updateProfile error:', e); throw e; }
}

async function signInWithGoogle() {
  toast('正在登入...', 'info');
  try {
    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    const result = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    if (result.user) toast('登入成功！', 'success');
  } catch (e) {
    console.warn('Login error:', e.code || e.message);
    const msg = e.message || '';
    // COOP error: Chrome blocks popup communication on file://
    if (msg.includes('Cross-Origin-Opener-Policy') || msg.includes('close')) {
      toast('無法完成登入：請部署到 Vercel 或使用本機伺服器（npm install -g serve && serve .）', 'error', 6000);
    }
    // Popup blocked: try redirect
    else if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      toast('彈出視窗被阻擋，嘗試重新導向登入...', 'info');
      try {

// ===== Key Health & Per-Key Cursor =====
let keyHealth = {};
function rebuildKeyHealth() {
  const old = keyHealth;
  keyHealth = {};
  Object.entries(KEY_POOLS).forEach(([model, keys]) => {
    keys.forEach((k, i) => {
      const id = model + '_' + i;
      keyHealth[id] = old[id] || { key: k, status: 'healthy', cooldownUntil: 0, lastUsed: 0 };
      keyHealth[id].key = k;
    });
  });
}
rebuildKeyHealth();
let _keyCursor = { groq: 0, openrouter: 0 };

// ===== Per-Key Rate Limiter (true per-key, not per-model) =====
let _reqLog = [];
const RPM_PER_KEY = 25;
const MIN_INTERVAL = 1500;

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function checkKeyRate(keyId) {
  const now = Date.now();
  _reqLog = _reqLog.filter(t => now - t.time < 60000);
  const recent = _reqLog.filter(t => t.keyId === keyId).length;
  if (recent >= RPM_PER_KEY) {
    const oldest = _reqLog.filter(t => t.keyId === keyId).sort((a, b) => b.time - a.time).pop();
    const wait = oldest ? 60000 - (now - oldest.time) : 1000;
    throw { code: 'RATE_LIMITED', wait: Math.ceil(wait / 1000), message: `此 Key 達速率上限，冷卻 ${Math.ceil(wait/1000)} 秒` };
  }
  _reqLog.push({ time: now, keyId });
}

// ===== Try a single key with proper rate limiting & cooldown =====
async function tryKey(model, idx, prompt, isFast) {
  const healthKey = model + '_' + idx;
  const health = keyHealth[healthKey];
  if (!health || !health.key) return null;
  if (health.status === 'cooldown' && Date.now() < health.cooldownUntil) return null;
  try {
    await checkKeyRate(healthKey);
    let result;
    if (model === 'groq') result = await callGroq(prompt, idx);
    else result = await callOpenRouter(prompt, idx);
    health.status = 'healthy';
    health.lastUsed = Date.now();
    return result;
  } catch (e) {
    const isRateLimit = e.status === 429 || e.code === 'RATE_LIMITED' || e.message?.includes('429');
    const isTimeout = e.message?.includes('timeout') || e.message?.includes('超時') || e.message?.includes('Timed out');
    if (isRateLimit || isTimeout) {
      health.status = 'cooldown';
      health.cooldownUntil = Date.now() + (isRateLimit ? 30000 : 10000);
    }
    throw e;
  }
}

// ===== Try all keys in a model (round-robin), return result or null =====
async function tryModel(model, prompt, isFast) {
  const pool = KEY_POOLS[model];
  if (!pool || pool.length === 0) return null;
  const startIdx = _keyCursor[model] || 0;
  const len = pool.length;
  let lastErr = null;
  for (let i = 0; i < len; i++) {
    const idx = (startIdx + i) % len;
    const healthKey = model + '_' + idx;
    const health = keyHealth[healthKey];
    if (!health || !health.key) continue;
    if (health.status === 'cooldown' && Date.now() < health.cooldownUntil) continue;
    try {
      const result = await tryKey(model, idx, prompt, isFast);
      if (result !== null) {
        _keyCursor[model] = (idx + 1) % len;
        return result;
      }
    } catch (e) {
      lastErr = e;
    }
  }
  if (lastErr) throw lastErr;
  return null;
}

// ===== Vercel Serverless Proxy =====
async function callAIProxy(prompt) {
  const proxyUrl = '/api/generate';
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 55000);
  try {
    const r = await fetch(proxyUrl, {
      method: 'POST', signal: controller.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error || 'Proxy error: ' + r.status);
    }
    return await r.json();
  } finally {
    clearTimeout(timer);
  }
}

// ===== AI Call Router (Proxy → Groq → OpenRouter) =====
async function callAI(prompt) {
  if (state.useServerProxy) {
    try {
      return await callAIProxy(prompt);
    } catch (e) {
      console.warn('Proxy failed, falling back to direct keys:', e.message);
    }
  }
  const chain = ['groq', 'openrouter'];
  for (const model of chain) {
    try {
      const result = await tryModel(model, prompt, false);
      if (result) return result;
    } catch (e) {
      if (e.code === 'ALL_EXHAUSTED') throw e;
    }
  }
  throw { code: 'ALL_EXHAUSTED', message: '所有 AI 模型均無法使用', retryAfter: 3 };
}

// ===== Fast Grading (same chain, separate cursor state from callAI) =====
let _fastCursor = { groq: 0, openrouter: 0 };
async function callAIFast(prompt) {
  if (state.useServerProxy) {
    try {
      return await callAIProxy(prompt);
    } catch (e) {
      console.warn('Proxy failed for fast grading, falling back');
    }
  }
  const saved = { ..._keyCursor };
  _keyCursor = _fastCursor;
  try {
    const result = await callAI(prompt);
    _fastCursor = { ..._keyCursor };
    return result;
  } finally {
    _keyCursor = saved;
  }
}

// ===== Groq API =====
async function callGroq(prompt, keyIdx) {
  const key = KEY_POOLS.groq[keyIdx];
  if (!key) throw new Error('No Groq key');
  const url = 'https://api.groq.com/openai/v1/chat/completions';
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 60000);
  try {
    const res = await fetch(url, {
      method: 'POST', signal: controller.signal,
      headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.9, max_tokens: 8192
      })
    });
    if (res.status === 429) throw { status: 429, message: 'Groq quota exceeded' };
    if (!res.ok) throw new Error('Groq error: ' + res.status);
    const data = await res.json();
    let text = data.choices?.[0]?.message?.content || '';
    text = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    return JSON.parse(text);
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('Groq timeout');
    throw e;
  } finally {
    clearTimeout(timeout);
  }
}

// ===== OpenRouter API =====
async function callOpenRouter(prompt, keyIdx) {
  const key = KEY_POOLS.openrouter[keyIdx];
  if (!key) throw new Error('No OpenRouter key');
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 60000);
  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST', signal: controller.signal,
      headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json', 'HTTP-Referer': window.location.origin, 'X-Title': 'AIQuiz' },
      body: JSON.stringify({
        model: 'deepseek/deepseek-chat',
        messages: [{ role: 'user', content: prompt }],

      })
    });
    if (res.status === 429) throw { status: 429, message: 'OpenRouter quota exceeded' };
    if (!res.ok) throw new Error('OpenRouter error: ' + res.status);
    const data = await res.json();
    let text = data.choices?.[0]?.message?.content || '';
    text = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    return JSON.parse(text);
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('OpenRouter timeout');
    throw e;
  } finally {

}

let curriculumData = null;

async function loadCurriculum() {
  try {
    const doc = await db.collection('admin_config').doc('curriculum').get();
    if (doc.exists) {
      curriculumData = doc.data();
    } else {
      curriculumData = JSON.parse(JSON.stringify(DEFAULT_CURRICULUM));
      await db.collection('admin_config').doc('curriculum').set(curriculumData);
    }
  } catch(e) {
    console.error('課綱載入失敗', e);
    curriculumData = { label: '課綱載入失敗', grade: '', subjects: [] };
  }
}
_curriculumLoadPromise = loadCurriculum();

function selectSubject(id) {
  _selectedSubject = id;
  _selectedUnit = null;
  state._selectedSubUnits = [];
  renderQuiz();
}

function selectUnit(id) {
  _selectedUnit = id;
  state._selectedSubUnits = [];
  renderQuiz();
}

function toggleSubUnit(val) {
  if (!state._selectedSubUnits) state._selectedSubUnits = [];
  const idx = state._selectedSubUnits.indexOf(val);
  if (idx === -1) {
    state._selectedSubUnits.push(val);
  } else {
    state._selectedSubUnits.splice(idx, 1);
  }
  renderQuiz();
}

function pickTopic(topic) {
  const input = $('quizTopic');
  if (input) input.value = topic;
  state._lastTopic = topic;
}



async function startQuiz() {
  await acquireSlot(['startQuizBtn', 'randomQuizBtn', 'errorReviewBtn']);
  const customTopic = $('quizTopic')?.value.trim();
  if (!_selectedSubject) { toast('請先選擇科目', 'error'); releaseSlot(['startQuizBtn', 'randomQuizBtn', 'errorReviewBtn']); return; }
  if (!curriculumData) { toast('課綱資料尚未載入', 'error'); releaseSlot(['startQuizBtn', 'randomQuizBtn', 'errorReviewBtn']); return; }

  const selSubject = curriculumData.subjects.find(s => s.id === _selectedSubject);
  const selUnit = selSubject ? selSubject.units.find(u => u.id === _selectedUnit) : null;
  const selSubUnits = state._selectedSubUnits || [];

  const subjectLabel = selSubject ? selSubject.label : '';
  const unitLabel = selUnit ? selUnit.label : '';
  const subUnitStr = selSubUnits.length > 0 ? '（' + selSubUnits.join('、') + '）' : '';

  const fullTopic = [
    curriculumData.label,
    '國一',
    subjectLabel,
    unitLabel,
    subUnitStr,
    customTopic ? `- ${customTopic}` : ''
  ].filter(Boolean).join(' ');

  const qCount = parseInt($('countSelect')?.value) || 10;
  state.timerMinutes = parseInt($('timerSelect')?.value) || 0;
  state.timerRemaining = state.timerMinutes * 60;
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }

  loading(true);
  try {
    const result = await generateQuizFromAI(fullTopic, _selectedSubject, qCount);
    if (!result.questions || result.questions.length === 0) throw new Error('沒有生成題目');

    const questions = shuffle(result.questions).map(q => ({ ...q, id: uid() }));
    state.quizSession = {
      id: uid(),
      topic: fullTopic,
      questions,
      startedAt: new Date().toISOString()
    };
    state.quizAnswers = {};
    state.currentQIdx = 0;
    state.quizMode = 'taking';
    state._lastTopic = fullTopic;
    renderQuizTaking();
    startTimer();
    toast(`已生成 ${questions.length} 題`, 'success');
  } catch(e) {
    console.error(e);
    const msg = e.message || '生成失敗';
    if (e.code === 'ALL_EXHAUSTED' || msg.includes('所有')) {
      const coolingEl = $('quizLoading') || $('startQuizBtn');
      if (coolingEl) {
        coolingEl.insertAdjacentHTML('afterend',
          `<div class="card" style="margin-top:12px;text-align:center;padding:24px;background:var(--warning-light);border:2px solid #FCD34D" id="retryCard">
            <div style="font-size:2rem;margin-bottom:8px">🧠</div>
            <div style="font-size:1rem;font-weight:600">AI 正在深思中，請稍候 3 秒</div>
            <div class="text-xs text-muted mt-2">系統將自動重試...</div>
            <div class="spinner" style="margin-top:12px;width:20px;height:20px"></div>
          </div>`
        );
      }
      setTimeout(() => {
        const card = $('retryCard');
        if (card) card.remove();
        startQuiz();
      }, 3000);
    } else if (msg.includes('冷卻')) {
      toast('🔄 ' + msg, 'info');
      const coolingEl = $('quizLoading') || $('startQuizBtn');
      if (coolingEl) {
        coolingEl.insertAdjacentHTML('afterend',
          `<div class="card" style="margin-top:12px;text-align:center;padding:20px;background:var(--warning-light);border:1px solid #FCD34D">
            <div style="font-size:1.5rem;margin-bottom:8px">⏳</div>
            <div style="font-size:.875rem;font-weight:600">AI 冷卻排隊中</div>
            <div class="text-xs text-muted mt-2">所有 API Key 暫時限流，請等待 30 秒後再試</div>
            <button class="btn btn-primary btn-sm mt-2" onclick="startQuiz()">重試</button>
          </div>`
        );
      }
    } else {
      toast('題目生成失敗：' + msg, 'error');
    }
  } finally {
    loading(false);
    releaseSlot(['startQuizBtn', 'randomQuizBtn', 'errorReviewBtn']);
  }
}

async function startRandomQuiz() {
  await acquireSlot(['startQuizBtn', 'randomQuizBtn', 'errorReviewBtn']);
  if (!curriculumData || !curriculumData.subjects || curriculumData.subjects.length === 0) {
    toast('課綱資料未載入', 'error');
    releaseSlot(['startQuizBtn', 'randomQuizBtn', 'errorReviewBtn']);
    return;
  }
  const subjects = curriculumData.subjects;
  const randSubject = subjects[Math.floor(Math.random() * subjects.length)];
  const units = randSubject.units || [];
  const randUnit = units.length > 0 ? units[Math.floor(Math.random() * units.length)] : null;
  const subUnits = randUnit?.subUnits || [];
  const shuffledSubs = shuffle(subUnits);
  const pickedSubs = shuffledSubs.slice(0, Math.min(1 + Math.floor(Math.random() * 2), shuffledSubs.length));

  _selectedSubject = randSubject.id;
  _selectedUnit = randUnit?.id || null;
  state._selectedSubUnits = pickedSubs;

  const qCount = parseInt($('countSelect')?.value) || 10;
  state.timerMinutes = parseInt($('timerSelect')?.value) || 0;
  state.timerRemaining = state.timerMinutes * 60;
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }

  const topic = [
    curriculumData.label,
    '國一',
    randSubject.label,
    randUnit?.label || '',
    pickedSubs.length > 0 ? '（' + pickedSubs.join('、') + '）' : ''
  ].filter(Boolean).join(' ');

  loading(true);
  try {
    const result = await generateQuizFromAI(topic, randSubject.id, qCount);
    if (!result.questions || result.questions.length === 0) throw new Error('沒有生成題目');
    const questions = shuffle(result.questions).map(q => ({ ...q, id: uid() }));
    state.quizSession = {
      id: uid(),
      topic,
      questions,
      startedAt: new Date().toISOString()
    };
    state.quizAnswers = {};
    state.currentQIdx = 0;
    state.quizMode = 'taking';
    renderQuizTaking();
    startTimer();
    toast(`🎲 隨機挑戰：${topic}，共 ${questions.length} 題`, 'success');
  } catch (e) {
    console.error(e);
    const msg = e.message || '生成失敗';
    if (e.code === 'ALL_EXHAUSTED' || msg.includes('所有')) {
      toast('AI 正在排隊，請稍後再試', 'info');
      setTimeout(() => startRandomQuiz(), 3000);
    } else {
      toast('隨機出題失敗：' + msg, 'error');
    }
  } finally {
    loading(false);
    releaseSlot(['startQuizBtn', 'randomQuizBtn', 'errorReviewBtn']);
  }
}

function renderQuizTaking() {
  const session = state.quizSession;
  if (!session || !session.questions?.length) { state.quizMode = 'idle'; renderQuiz(); return; }

  const q = session.questions[state.currentQIdx];
  const total = session.questions.length;
  const answered = Object.keys(state.quizAnswers).length;
  const progress = total > 0 ? (answered / total * 100) : 0;

  const tags = q.knowledgeTags?.map(t => `<span class="tag tag-blue tag-sm">${t}</span>`).join('') || '';
  const typeName = { 'multiple-choice': '單選', 'fill-in-blank': '填充', 'true-false': '是非', 'short-answer': '簡答' }[q.type] || q.type;
  const diffLabel = { 'easy': '簡單', 'medium': '中等', 'hard': '困難' }[q.difficulty] || q.difficulty;
  const diffClass = { 'easy': 'tag-green', 'medium': 'tag-yellow', 'hard': 'tag-red' }[q.difficulty] || 'tag-gray';

  const dots = session.questions.map((x, i) =>
    `<div class="question-dot ${i === state.currentQIdx ? 'active' : ''} ${state.quizAnswers[x.id] ? 'answered' : ''}" onclick="goToQuestion(${i})">${i+1}</div>`
  ).join('');

  const prevBtn = state.currentQIdx > 0
    ? `<button class="btn btn-outline" onclick="prevQuestion()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> 上一題</button>`
    : `<div></div>`;

  const nextBtn = state.currentQIdx < total - 1
    ? `<button class="btn btn-primary" onclick="nextQuestion()">下一題 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>`
    : `<button class="btn btn-success btn-lg" onclick="finishQuiz()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 完成作答</button>`;

  let optionsHtml = '';
  const selected = state.quizAnswers[q.id] || '';

  function optClass(o) {
    if (!selected) return '';
    if (o === q.correctAnswer) return 'correct';
    if (o === selected && selected !== q.correctAnswer) return 'wrong';
    if (o === selected) return 'selected';
    return '';
  }
  function optIcon(o) {
    if (!selected) return '';
    if (o === q.correctAnswer) return '<svg class="option-icon" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
    if (o === selected && selected !== q.correctAnswer) return '<svg class="option-icon" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    return '';
  }

  if (q.type === 'multiple-choice' && q.options) {
    optionsHtml = `<div class="options-list">${q.options.map(o =>
      `<button class="option-btn ${optClass(o)}" onclick="${selected ? '' : "answerQuestion('" + q.id + "','" + o.replace(/'/g, "\\'") + "')"}">
        <span class="option-text">${cleanText(o)}</span>
        ${optIcon(o)}
      </button>`
    ).join('')}</div>`;
  } else if (q.type === 'true-false') {
    optionsHtml = `<div class="true-false-group">
      ${['正確','錯誤'].map(o =>
        `<button class="option-btn ${optClass(o)}" onclick="${selected ? '' : "answerQuestion('" + q.id + "','" + o + "')"}">${o}${optIcon(o)}</button>`
      ).join('')}
    </div>`;
  } else if (q.type === 'fill-in-blank') {
    optionsHtml = `<input class="fill-input" value="${selected}" oninput="answerQuestion('${q.id}', this.value)" placeholder="請輸入答案..." autocomplete="off">`;
  } else if (q.type === 'short-answer') {
    optionsHtml = `<textarea class="textarea" style="min-height:100px" oninput="answerQuestion('${q.id}', this.value)" placeholder="請輸入你的答案...">${selected}</textarea>`;
  }

  // Feedback when answered
  let feedbackHtml = '';
  if (selected) {
    const isCorrect = selected.trim().toLowerCase() === (q.correctAnswer || '').trim().toLowerCase();
    feedbackHtml = `
      <div style="margin-top:16px;padding:14px 16px;border-radius:var(--radius-sm);background:${isCorrect ? 'var(--success-light)' : 'var(--danger-light)'};border:1px solid ${isCorrect ? 'var(--success)' : 'var(--danger)'}">
        <div style="display:flex;align-items:center;gap:8px;font-weight:600;margin-bottom:8px">
          <span style="font-size:1.3rem">${isCorrect ? '✅' : '❌'}</span>
          <span style="color:${isCorrect ? 'var(--success)' : 'var(--danger)'};font-size:.9375rem">${isCorrect ? '正確！' : '錯誤'}</span>
        </div>
        ${!isCorrect ? `<div class="text-sm" style="margin-bottom:6px;font-weight:500">正確答案：<span style="color:var(--success)">${q.correctAnswer}</span></div>` : ''}
        <div class="text-sm" style="color:var(--gray-600);line-height:1.7;margin-top:4px;padding-top:8px;border-top:1px solid ${isCorrect ? 'var(--success)' : 'var(--danger)'}30">${q.explanation || ''}</div>
      </div>`;
  }

  const el = $('quizContent');
  el.innerHTML = `
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${progress}%"></div></div>
        <span class="text-sm text-muted">${answered}/${total}</span>
        ${state.timerMinutes > 0 ? `<span class="tag ${state.timerRemaining <= 60 ? 'tag-red' : state.timerRemaining <= 180 ? 'tag-yellow' : 'tag-gray'}" id="timerDisplay">${Math.floor(state.timerRemaining/60)}:${String(state.timerRemaining%60).padStart(2,'0')}</span>` : ''}
      </div>
    </div>
    <div class="card" style="animation:fadeIn .25s ease">
      <div class="question-header">
        <span class="question-meta">第 ${state.currentQIdx+1}/${total} 題</span>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="tag ${diffClass} tag-sm">${diffLabel}</span>
          <span class="question-type-badge">${typeName}</span>
        </div>
      </div>
      ${tags ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px">${tags}</div>` : ''}
      <div class="question-content">${cleanText(q.content)}</div>
      ${optionsHtml}
      ${feedbackHtml}
    </div>
    <div class="quiz-nav">
      ${prevBtn}
      <div class="question-dots">${dots}</div>
      ${nextBtn}
    </div>`;
}

function answerQuestion(qid, answer) {
  if (state._answering) return;
  state._answering = true;
  state.quizAnswers[qid] = answer;
  const session = state.quizSession;
  if (session) {
    const q = session.questions.find(x => x.id === qid);
    if (q && answer.trim().toLowerCase() === (q.correctAnswer || '').trim().toLowerCase()) {
      playCorrectSound();
    } else if (q) {
      playWrongSound();
    }
  }
  renderQuizTaking();
}

function goToQuestion(idx) {
  state._answering = false;
  if (idx >= 0 && idx < state.quizSession.questions.length) {
    state.currentQIdx = idx;
    renderQuizTaking();
  }
}

function nextQuestion() {
  state._answering = false;
  if (state.currentQIdx < state.quizSession.questions.length - 1) {
    state.currentQIdx++;
    renderQuizTaking();
  }
}

function prevQuestion() {
  state._answering = false;
  if (state.currentQIdx > 0) {
    state.currentQIdx--;
    renderQuizTaking();
  }
}

function finishQuiz() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
  const session = state.quizSession;
  const total = session.questions.length;
  let correct = 0;
  const answers = [];
  session.questions.forEach(q => {
    const userAns = state.quizAnswers[q.id] || '';
    const isCorrect = userAns.trim().toLowerCase() === q.correctAnswer.trim().toLowerCase();
    if (isCorrect) correct++;
    answers.push({
      userId: state.user?.uid,
      sessionId: session.id,
      questionId: q.id,
      questionType: q.type,
      userAnswer: userAns,
      correctAnswer: q.correctAnswer,
      isCorrect,
      knowledgeTags: q.knowledgeTags || [],
      difficulty: q.difficulty,
      answeredAt: new Date().toISOString()
    });
  });

  state.quizMode = 'reviewing';
  saveQuizSession(session, correct, answers);
  renderQuizReview();
  // Auto-generate note after quiz
  setTimeout(() => generateNote(), 500);
}

async function updateStreak() {
  if (!state.user || !state.profile) return;
  const today = new Date().toISOString().slice(0, 10);
  const lastDate = state.profile.lastActiveDate || '';
  let streak = state.profile.streak || 0;
  if (lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (lastDate === yesterday) {
    streak++;
  } else {
    streak = 1;
  }
  state.profile.streak = streak;
  state.profile.lastActiveDate = today;
  try {
    await db.collection('profiles').doc(state.user.uid).set(
      { streak, lastActiveDate: today },
      { merge: true }
    );
  } catch(e) { console.error('streak update error:', e); }
}

async function saveQuizSession(session, score, answers) {
  if (!state.user) return;
  try {
    await db.collection('quiz_sessions').doc(session.id).set({
      userId: state.user.uid,
      topic: session.topic,
      totalQuestions: session.questions.length,
      score,
      questions: session.questions,
      answers: state.quizAnswers,
      startedAt: session.startedAt,
      completedAt: new Date().toISOString()
    });
    // Batch save answers
    const batch = db.batch();
    answers.forEach(a => {
      const ref = db.collection('quiz_answers').doc(uid());
      batch.set(ref, a);
    });
    await batch.commit();
    updateStreak();
  } catch(e) { console.error('save error:', e); }
}

    const ua = state.quizAnswers[q.id] || '';
    const ic = ua.trim().toLowerCase() === q.correctAnswer.trim().toLowerCase();
    return `<div class="card" style="margin-bottom:8px;padding:14px">
      <div style="display:flex;align-items:flex-start;gap:10px">

          ${ic

        </div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
            <div style="font-size:.875rem;margin-bottom:4px;font-weight:600">${i+1}. ${cleanText(q.content)}</div>
            <button class="btn btn-ghost btn-sm" style="flex-shrink:0;padding:2px 6px;font-size:1rem" onclick="toggleBookmark('${q.id}','${cleanText(q.content).replace(/'/g, "\\'")}','${cleanText(q.correctAnswer).replace(/'/g, "\\'")}','${(q.knowledgeTags||[]).join(',')}')" title="收藏題目">${state._bookmarked?.[q.id] ? '⭐' : '☆'}</button>
          </div>

            <span>你的答案：<strong>${ua}</strong></span>
            &nbsp;&nbsp;
            <span style="color:var(--success)">正確答案：<strong>${cleanText(q.correctAnswer)}</strong></span>
          </div>
          <div class="text-xs" style="margin-top:6px;padding:8px;background:var(--gray-50);border-radius:6px;color:var(--gray-600)">
            💡 ${cleanText(q.explanation || '')}
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">

          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  $('quizContent').innerHTML = `
    <div class="card text-center" style="padding:32px 20px;margin-bottom:20px">
      <div class="result-grade" style="background:${gradeBg};color:${gradeColor};margin:0 auto 16px">${grade}</div>
      <h2 style="margin-bottom:4px">練習完成！</h2>
      <p class="text-muted text-sm mb-4">${session.topic}</p>
      <div class="result-stats">
        <div class="stat-card"><div class="stat-value" style="color:var(--success)">${correct}</div><div class="stat-label">正確</div></div>
        <div class="stat-card"><div class="stat-value" style="color:var(--danger)">${total-correct}</div><div class="stat-label">錯誤</div></div>
        <div class="stat-card"><div class="stat-value" style="color:var(--primary)">${acc}%</div><div class="stat-label">正確率</div></div>
      </div>
      <div class="progress-bar" style="margin:16px 0"><div class="progress-fill" style="width:${acc}%;background:${acc>=60 ? 'var(--primary)' : 'var(--danger)'}"></div></div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px">
        <button class="btn btn-outline" onclick="retryQuiz()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> 重新練習</button>

function retryQuiz() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
  state.quizMode = 'idle';
  state.quizSession = null;
  state.quizAnswers = {};
  state.currentQIdx = 0;
  renderQuiz();
}

/* ============================================================
   ERROR REVIEW
   ============================================================ */
async function startErrorReview() {
  await acquireSlot(['errorReviewBtn']);
  if (!state.user) { toast('請先登入', 'error'); releaseSlot(['errorReviewBtn']); return; }
  loading(true);
  try {
    const snap = await db.collection('quiz_answers')
      .where('userId', '==', state.user.uid)
      .where('isCorrect', '==', false)
      .limit(50)
      .get();
    const wrongAnswers = [];
    snap.forEach(d => wrongAnswers.push({ id: d.id, ...d.data() }));
    if (wrongAnswers.length === 0) {
      toast('🎉 沒有錯題！你太強了！', 'success');
      loading(false);
      return;
    }
    const sessionIds = [...new Set(wrongAnswers.map(a => a.sessionId).filter(Boolean))];
    const questionMap = {};
    if (sessionIds.length > 0) {
      const chunks = [];
      for (let i = 0; i < sessionIds.length; i += 10) chunks.push(sessionIds.slice(i, i + 10));
      for (const chunk of chunks) {
        const sSnap = await db.collection('quiz_sessions')
          .where('userId', '==', state.user.uid)
          .where('__name__', 'in', chunk)
          .get();
        sSnap.forEach(d => {
          const s = d.data();
          (s.questions || []).forEach(q => { questionMap[q.id] = q; });
        });
      }
    }
    const reviewQuestions = wrongAnswers.map(a => {
      const q = questionMap[a.questionId];
      if (q) return { ...q, id: uid() };
      return {
        id: uid(), type: 'multiple-choice', content: '錯題回顧', difficulty: 'medium',
        options: ['A. 重新練習', 'B. 查看解析', 'C. 跳過', 'D. '],
        correctAnswer: a.correctAnswer || 'A. 重新練習',
        explanation: '此為歷史錯題，正確答案：' + (a.correctAnswer || ''),
        knowledgeTags: a.knowledgeTags || ['#錯題']
      };
    });
    state.quizSession = {
      id: uid(),
      topic: '📝 錯題複習（' + reviewQuestions.length + ' 題）',
      questions: shuffle(reviewQuestions),
      startedAt: new Date().toISOString()
    };
    state.quizAnswers = {};
    state.currentQIdx = 0;
    state.quizMode = 'taking';
    state.timerMinutes = 0;
    state.timerRemaining = 0;
    if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
    navigate('quiz');
    renderQuizTaking();
    toast(`📝 錯題複習：共 ${reviewQuestions.length} 題`, 'info');
  } catch (e) {
    console.error(e);
    toast('載入錯題失敗：' + e.message, 'error');
  } finally {
    loading(false);
    releaseSlot(['errorReviewBtn']);
  }
}

async function renderDashboard() {
  const el = $('dashboardContent');
  if (!state.user) { el.innerHTML = '<div class="text-center text-muted" style="padding:40px">請先登入</div>'; return; }

  el.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';

  try {
    const sessionsSnap = await db.collection('quiz_sessions')
      .where('userId', '==', state.user.uid)
      .get();

    const allSessions = [];
    sessionsSnap.forEach(d => allSessions.push({ id: d.id, ...d.data() }));

    const totalQuizzes = allSessions.length;
    const totalCorrect = allSessions.reduce((s, x) => s + (x.score || 0), 0);
    const totalQ = allSessions.reduce((s, x) => s + (x.totalQuestions || 0), 0);
    const avgAcc = accuracy(totalCorrect, totalQ);

    allSessions.sort((a, b) => ((b.completedAt||'') + '').localeCompare((a.completedAt||'') + ''));
    const sessions = allSessions.slice(0, 20);

    const progressData = sessions.slice().reverse().map(s => ({
      date: formatDate(s.completedAt),
      accuracy: s.totalQuestions > 0 ? accuracy(s.score, s.totalQuestions) : 0
    }));

    // Knowledge tags from answers
    const answersSnap = await db.collection('quiz_answers')
      .where('userId', '==', state.user.uid)
      .limit(200)
      .get();
    const tagMap = {};
    answersSnap.forEach(d => {
      const a = d.data();
      (a.knowledgeTags || []).forEach(t => {
        if (!tagMap[t]) tagMap[t] = { correct: 0, total: 0 };
        tagMap[t].total++;
        if (a.isCorrect) tagMap[t].correct++;
      });
    });
    const radarData = Object.entries(tagMap).map(([tag, v]) => ({
      tag: tag.replace('#',''),
      mastery: v.total > 0 ? Math.round(v.correct/v.total*100) : 0
    }));

    const recentHtml = sessions.slice(0, 8).map(s =>
      `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-100)">
        <div><div class="text-sm" style="font-weight:500">${s.topic || '未命名'}</div><div class="text-xs text-muted">${formatDate(s.completedAt)}</div></div>
        <div style="text-align:right"><div class="text-sm" style="font-weight:600">${s.score||0}/${s.totalQuestions||0}</div><div class="text-xs" style="color:${(s.score||0)/(s.totalQuestions||1)>=0.7?'var(--success)':'var(--warning)'}">${s.totalQuestions>0?accuracy(s.score,s.totalQuestions):0}%</div></div>
      </div>`
    ).join('');

    const streak = state.profile?.streak || 0;
    el.innerHTML = `
      <div class="grid grid-2" style="margin-bottom:20px">
        <div class="card stat-card"><div class="stat-value">${totalQuizzes}</div><div class="stat-label">總練習次數</div></div>
        <div class="card stat-card"><div class="stat-value" style="color:var(--primary)">${avgAcc}%</div><div class="stat-label">平均正確率</div></div>
        <div class="card stat-card"><div class="stat-value" style="color:#EAB308">${streak > 0 ? '🔥' + streak : '—'}</div><div class="stat-label">連續天數</div></div>
        <div class="card" style="display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;padding:16px" onclick="startErrorReview()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <span class="text-sm" style="font-weight:600;color:var(--danger)">錯題複習</span>
        </div>
      </div>
      ${sessions.length > 0 ? `
      <div class="grid grid-2" style="margin-bottom:20px">
        <div class="card"><h3 style="font-size:.875rem;margin-bottom:12px">📈 進步曲線</h3><div class="chart-container"><canvas id="progressChart"></canvas></div></div>
        <div class="card"><h3 style="font-size:.875rem;margin-bottom:12px">🎯 知識雷達圖</h3><div class="chart-container"><canvas id="radarChart"></canvas></div></div>
      </div>` : ''}
      <div class="card">
        <h3 style="font-size:.875rem;margin-bottom:12px">最近練習</h3>
        ${sessions.length > 0 ? recentHtml : '<div class="text-center text-muted text-sm" style="padding:20px">尚無練習紀錄，<a href="#quiz" style="color:var(--primary)" onclick="navigate(\'quiz\')">開始第一次練習</a></div>'}
      </div>`;

    // Render charts after DOM update
    if (sessions.length > 0) {
      setTimeout(() => {
        renderCharts(progressData, radarData);
      }, 100);
    }
  } catch(e) {
    console.error(e);
    el.innerHTML = `
      <div class="card text-center" style="padding:40px">
        <div style="font-size:2rem;margin-bottom:12px">📊</div>
        <p class="text-muted">載入儀表板失敗</p>
        <p class="text-xs text-muted mt-2">${e.message}</p>
        <p class="text-xs text-muted mt-2">請確認：1. Firebase Firestore 資料庫已建立 2. 規則設為測試模式 3. 已用 Google 登入</p>
      </div>`;
  }
}

function renderCharts(progressData, radarData) {
  // Progress chart
  const pCtx = document.getElementById('progressChart')?.getContext('2d');
  if (pCtx && state.dashboardChart) { state.dashboardChart.destroy(); }
  if (pCtx && progressData.length > 0) {
    state.dashboardChart = new Chart(pCtx, {
      type: 'line',
      data: {
        labels: progressData.map(d => d.date),
        datasets: [{
          label: '正確率',
          data: progressData.map(d => d.accuracy),
          borderColor: '#2563EB',
          backgroundColor: 'rgba(37,99,235,.1)',
          fill: true,
          tension: .4,
          pointRadius: 4,
          pointBackgroundColor: '#2563EB'
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { min: 0, max: 100, ticks: { callback: v => v+'%' }, grid: { color: 'rgba(0,0,0,.05)' } },

  if (rCtx && state.radarChart) { state.radarChart.destroy(); }
  if (rCtx && radarData.length > 0) {
    state.radarChart = new Chart(rCtx, {
      type: 'radar',
      data: {
        labels: radarData.map(d => d.tag),
        datasets: [{
          label: '熟練度',
          data: radarData.map(d => d.mastery),
          backgroundColor: 'rgba(37,99,235,.08)',
          borderColor: '#2563EB',
          borderWidth: 2,
          pointRadius: 0,
          pointHitRadius: 10
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: 'rgba(0,0,0,.06)' } } },
        plugins: { legend: { display: false } }
      }
    });
  }
}

const SUBJECT_MAP = {
  '國語': { id: 'chinese', label: '國語', short: '國', color: '#0B5EAC' },
  '國文': { id: 'chinese', label: '國文', short: '國', color: '#0B5EAC' },
  '英文': { id: 'english', label: '英文', short: '英', color: '#72A0CB' },
  '數學': { id: 'math', label: '數學', short: '數', color: '#16A34A' },
  '生物': { id: 'science', label: '生物', short: '自', color: '#D97706' },
  '自然': { id: 'science', label: '自然', short: '自', color: '#D97706' },
  '歷史': { id: 'history', label: '歷史', short: '社', color: '#DC2626' },
  '地理': { id: 'geography', label: '地理', short: '社', color: '#8B5CF6' },
  '公民': { id: 'civics', label: '公民', short: '社', color: '#EC4899' }
};

async function renderDiagnosis() {
  const el = $('diagnosisContent');
  if (!state.user) { el.innerHTML = '<div class="card text-center" style="padding:40px"><p class="text-muted">請先登入</p></div>'; return; }

  el.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';

  try {
    const snap = await db.collection('quiz_answers')
      .where('userId', '==', state.user.uid)
      .limit(500)
      .get();

    const answers = [];
    snap.forEach(d => answers.push(d.data()));
    if (answers.length === 0) {
      el.innerHTML = '<div class="card text-center" style="padding:40px"><div style="font-size:3rem;margin-bottom:12px">📊</div><h3>尚無答題紀錄</h3><p class="text-muted text-sm mt-2">完成練習後即可在此查看弱點分析</p></div>';
      return;
    }

    const subjectStats = {};
    const unitStats = {};
    const wrongAnswers = [];

    answers.forEach(a => {
      const tags = a.knowledgeTags || [];
      const isCorrect = a.isCorrect;
      if (!isCorrect) wrongAnswers.push(a);

      let subject = null;
      let unit = null;
      tags.forEach(t => {
        const st = Object.values(SUBJECT_MAP).find(s => t.toLowerCase().includes(s.label.toLowerCase()) || t.toLowerCase().includes(s.short));
        if (st && !subject) subject = st.id;
        if (t.startsWith('#')) {
          const clean = t.replace('#', '');
          if (!SUBJECT_MAP[clean]) unit = clean;
        }
      });

      if (!subject) {
        if (tags.some(t => /國語|國文|chinese/i.test(t))) subject = 'chinese';
        else if (tags.some(t => /英文|english/i.test(t))) subject = 'english';
        else if (tags.some(t => /數學|math/i.test(t))) subject = 'math';
        else if (tags.some(t => /生物|自然|science/i.test(t))) subject = 'science';
        else if (tags.some(t => /歷史|地理|公民|history|geography|civics/i.test(t))) subject = 'social';
      }

      if (subject) {
        if (!subjectStats[subject]) subjectStats[subject] = { correct: 0, total: 0 };
        subjectStats[subject].total++;
        if (isCorrect) subjectStats[subject].correct++;
      }

      if (unit) {
        const key = subject + '_' + unit;
        if (!unitStats[key]) unitStats[key] = { subject, unit, correct: 0, total: 0 };
        unitStats[key].total++;
        if (isCorrect) unitStats[key].correct++;
      }
    });

    // Also try to get subject from sessions
    const sessionsSnap = await db.collection('quiz_sessions')
      .where('userId', '==', state.user.uid)
      .limit(100)
      .get();

    sessionsSnap.forEach(d => {
      const s = d.data();
      const topic = s.topic || '';
      Object.entries(SUBJECT_MAP).forEach(([name, info]) => {
        if (topic.includes(name)) {
          if (!subjectStats[info.id]) subjectStats[info.id] = { correct: 0, total: 0 };
          subjectStats[info.id].total += s.totalQuestions || 0;
          subjectStats[info.id].correct += s.score || 0;
        }
      });
    });

    const subjectLabels = { chinese: '國語', english: '英文', math: '數學', science: '生物', social: '社合' };
    const subjectOrder = ['chinese', 'english', 'math', 'science', 'social'];
    const radarData = subjectOrder.map(id => {
      const st = subjectStats[id] || { correct: 0, total: 0 };
      const acc = st.total > 0 ? Math.round(st.correct / st.total * 100) : 0;
      return { subject: subjectLabels[id] || id, accuracy: acc };
    });

    const unitList = Object.entries(unitStats).map(([key, v]) => ({
      key,
      subject: v.subject,
      unit: v.unit,
      accuracy: v.total > 0 ? Math.round(v.correct / v.total * 100) : 0,
      total: v.total
    })).sort((a, b) => a.accuracy - b.accuracy);

    // Group units by subject
    const unitsBySubject = {};
    unitList.forEach(u => {
      if (!unitsBySubject[u.subject]) unitsBySubject[u.subject] = [];
      unitsBySubject[u.subject].push(u);
    });
    const subjectOrderAll = ['chinese', 'english', 'math', 'science', 'social', 'history', 'geography', 'civics'];
    const subjectLabelsAll = { chinese: '國語', english: '英文', math: '數學', science: '生物', social: '社合', history: '歷史', geography: '地理', civics: '公民' };
    const subjectColors = { chinese: '#0B5EAC', english: '#72A0CB', math: '#16A34A', science: '#D97706', social: '#DC2626', history: '#DC2626', geography: '#8B5CF6', civics: '#EC4899' };
    const subjectIcons = { chinese: '🇹🇼', english: '🇬🇧', math: '🔢', science: '🧬', social: '🌍', history: '🏛️', geography: '🗺️', civics: '⚖️' };

    el.innerHTML = `
      <div class="grid grid-2" style="margin-bottom:20px">
        <div class="card"><h3 style="font-size:.9375rem;margin-bottom:12px">🎯 全科雷達</h3><div class="chart-container" style="height:260px"><canvas id="diagnosisRadar"></canvas></div></div>
        <div class="card"><h3 style="font-size:.9375rem;margin-bottom:12px">📊 各科正確率</h3><div class="chart-container" style="height:260px"><canvas id="diagnosisBar"></canvas></div></div>
      </div>
      <div style="margin-bottom:16px">
        <h3 style="font-size:.9375rem;margin-bottom:12px">📖 各科章節分析</h3>
        ${subjectOrderAll.map(sid => {
          const units = unitsBySubject[sid];
          if (!units || units.length === 0) return '';
          const color = subjectColors[sid] || '#0B5EAC';
          const avgAcc = Math.round(units.reduce((s, u) => s + u.accuracy * u.total, 0) / Math.max(1, units.reduce((s, u) => s + u.total, 0)));
          return `<div class="card" style="margin-bottom:10px;border-left:4px solid ${color}">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <span style="font-size:1.2rem">${subjectIcons[sid] || '📚'}</span>
              <span style="font-weight:600;font-size:.9375rem">${subjectLabelsAll[sid] || sid}</span>
              <span class="tag tag-sm ${avgAcc >= 80 ? 'tag-green' : avgAcc >= 50 ? 'tag-yellow' : 'tag-red'}">${avgAcc}%</span>
            </div>
            ${units.map(u => {
              const lvl = u.accuracy >= 80 ? '精熟' : u.accuracy >= 50 ? '基礎' : '待加強';
              const c = u.accuracy >= 80 ? 'var(--success)' : u.accuracy >= 50 ? 'var(--warning)' : 'var(--danger)';
              return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--gray-50)">
                <div style="flex:1;font-size:.8125rem">${u.unit}</div>
                <div style="width:80px"><div class="progress-bar" style="height:6px"><div class="progress-fill" style="width:${u.accuracy}%;background:${c};height:6px"></div></div></div>
                <span class="text-xs" style="width:32px;text-align:right;font-weight:600;color:${c}">${u.accuracy}%</span>
                <span class="tag tag-sm" style="background:${c}15;color:${c};font-size:.625rem">${lvl}</span>
                ${u.accuracy < 80 ? `<button class="btn btn-sm btn-outline" style="padding:2px 8px;font-size:.6875rem" onclick="retryWeakUnit('${u.unit}')">複習</button>` : ''}
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>
      <div class="card" style="margin-bottom:16px">
        <h3 style="font-size:.9375rem;margin-bottom:12px">📖 章節診斷（全部）</h3>
        ${unitList.length > 0 ? unitList.map(u => {
          const level = u.accuracy >= 80 ? '精熟' : u.accuracy >= 50 ? '基礎' : '待加強';
          const color = u.accuracy >= 80 ? 'var(--success)' : u.accuracy >= 50 ? 'var(--warning)' : 'var(--danger)';
          const bg = u.accuracy >= 80 ? 'var(--success-light)' : u.accuracy >= 50 ? 'var(--warning-light)' : 'var(--danger-light)';
          return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-50)">
            <div style="flex:1;min-width:0">
              <div class="text-sm" style="font-weight:500">${u.unit}</div>
              <div class="text-xs text-muted">${u.total} 題</div>
            </div>
            <div style="width:60px;text-align:right;font-weight:700;color:${color}">${u.accuracy}%</div>
            <span class="tag" style="background:${bg};color:${color}">${level}</span>
            ${u.accuracy < 80 ? `<button class="btn btn-sm btn-outline" onclick="retryWeakUnit('${u.unit}')">再次挑戰</button>` : ''}
          </div>`;
        }).join('') : '<div class="text-sm text-muted text-center" style="padding:16px">尚無足夠數據</div>'}
      </div>
      <div class="card">
        <h3 style="font-size:.9375rem;margin-bottom:12px">❌ 錯題追蹤（最近 ${Math.min(wrongAnswers.length, 20)} 筆）</h3>
        ${wrongAnswers.length > 0 ? wrongAnswers.slice(0, 20).map(a =>
          `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-50)">
            <div style="flex-shrink:0;width:20px;height:20px;border-radius:50%;background:var(--danger-light);display:flex;align-items:center;justify-content:center">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
            <div style="flex:1;min-width:0">
              <div class="text-sm">${(a.questionId || '').slice(0, 40)}${(a.questionId||'').length > 40 ? '...' : ''}</div>
              <div class="text-xs text-muted">你的答案：${a.userAnswer || '無'} ｜ 正確：${a.correctAnswer || '無'}</div>
            </div>
          </div>`
        ).join('') : '<div class="text-sm text-muted text-center" style="padding:16px">沒有錯題，太棒了！</div>'}
      </div>`;

    setTimeout(() => {
      renderDiagnosisCharts(radarData);
    }, 100);

  } catch(e) {
    console.error(e);
    el.innerHTML = `<div class="card text-center" style="padding:40px"><p class="text-muted">載入診斷失敗</p><p class="text-xs text-muted mt-2">${e.message}</p></div>`;
  }
}

  if (rCtx && state.diagnosisRadarChart) { state.diagnosisRadarChart.destroy(); }
  if (rCtx) {
    state.diagnosisRadarChart = new Chart(rCtx, {
      type: 'radar',
      data: {

        datasets: [{

          backgroundColor: 'rgba(11,94,172,.06)',
          borderColor: '#0B5EAC',

        }]
      },

      type: 'bar',

          label: '正確率',
          data: radarData.map(d => d.accuracy),

          barThickness: 36
        }]
      },

        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },

}

function retryWeakUnit(unitName) {
  state._lastTopic = unitName;
  navigate('quiz');

    const input = $('quizTopic');
    if (input) input.value = unitName;
    toast(`正在為「${unitName}」生成複習題`, 'info');
  }, 300);
}

async function renderNotes() {
  const el = $('notesContent');
  if (!state.user) { el.innerHTML = '<div class="text-center text-muted" style="padding:40px">請先登入</div>'; return; }

  el.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';

  try {
    const snap = await db.collection('notes')
      .where('userId', '==', state.user.uid)
      .get();
    const notes = [];
    snap.forEach(d => notes.push({ id: d.id, ...d.data() }));
    notes.sort((a, b) => ((b.createdAt||'') + '').localeCompare((a.createdAt||'') + ''));
    notes.splice(20);

    if (notes.length === 0) {
      el.innerHTML = `<div class="card text-center" style="padding:40px">
        <div style="font-size:3rem;margin-bottom:12px">📝</div>
        <h3 style="margin-bottom:4px">尚無筆記</h3>

        <button class="btn btn-primary" onclick="generateNote()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2 7h7l-5 4 2 7-6-4-6 4 2-7-5-4h7z"/></svg>
          生成筆記
        </button>
      </div>`;
      return;
    }

    el.innerHTML = notes.map(n => `
      <div class="card" style="margin-bottom:12px">

          <div>
            <h3 style="font-size:.9375rem;margin:0">${n.title}</h3>
            <p class="text-xs text-muted mt-2">${formatDate(n.createdAt)}</p>
          </div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            ${(n.knowledgeTags||[]).slice(0,3).map(t => `<span class="tag tag-blue tag-sm">${t}</span>`).join('')}
          </div>
        </div>
        <div id="noteBody_${n.id}" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-100)">
          <div class="markdown-content">${marked.parse(n.content||'')}</div>
        </div>
      </div>
