  } catch(e) {
    console.error(e);
    el.innerHTML = `<div class="card text-center" style="padding:40px"><p class="text-muted">載入失敗</p></div>`;
  }
}

function toggleNote(id) {
  const body = $('noteBody_' + id);
  if (body) body.style.display = body.style.display === 'none' ? 'block' : 'none';
}

async function generateNote() {
  if (!state.user) { toast('請先登入', 'error'); return; }

  // Use the current session if in reviewing mode, else fetch latest from DB
  let session = null;
  let sessionQA = [];

  if (state.quizSession && state.quizMode === 'reviewing') {
    session = state.quizSession;
    session.questions.forEach(q => {
      const ua = state.quizAnswers[q.id] || '';
      sessionQA.push({
        content: q.content, options: q.options, explanation: q.explanation,
        userAnswer: ua,
        correctAnswer: q.correctAnswer,
        isCorrect: ua.trim().toLowerCase() === (q.correctAnswer || '').trim().toLowerCase(),
        knowledgeTags: q.knowledgeTags || []
      });
    });
    } else {
    loading(true);
    try {
      const snap = await db.collection('quiz_sessions')
        .where('userId', '==', state.user.uid)
        .get();
      if (snap.empty) { toast('尚無答題記錄', 'error'); loading(false); return; }
      const all = []; snap.forEach(d => all.push({ id: d.id, ...d.data() }));
      all.sort((a, b) => ((b.completedAt||'') + '').localeCompare((a.completedAt||'') + ''));
      session = all[0];
      const ansMap = session.answers || {};
      (session.questions || []).forEach(q => {
        const ua = ansMap[q.id] || '';
        sessionQA.push({
          content: q.content, options: q.options, explanation: q.explanation,
          userAnswer: ua,
          correctAnswer: q.correctAnswer,
          isCorrect: ua.trim().toLowerCase() === (q.correctAnswer || '').trim().toLowerCase(),
          knowledgeTags: q.knowledgeTags || []
        });
      });
    } catch(e) { toast('讀取最近練習失敗', 'error'); loading(false); return; }
  }

  if (sessionQA.length === 0) { toast('無題目資料', 'error'); loading(false); return; }

  const wrong = sessionQA.filter(a => !a.isCorrect);
  const correct = sessionQA.filter(a => a.isCorrect);
  const total = sessionQA.length;
  const acc = accuracy(correct.length, total);
  const topic = session.topic || '未命名練習';

  const prompt = `${NOTE_PROMPT_PREFIX}

本次練習主題：${topic}

答題統計：
總題數：${total}，正確：${correct.length}，錯誤：${wrong.length}，正確率：${acc}%

錯題詳情：
${wrong.slice(0, 10).map(a => `- 題目：${cleanText(a.content || '')}
  你的答案：${a.userAnswer}
  正確答案：${a.correctAnswer}
  解析：${cleanText(a.explanation || '')}
  知識點：${(a.knowledgeTags||[]).join(', ')}`).join('\n')}

正確題目知識點：
${correct.slice(0, 5).map(a => `- ${cleanText(a.content || '')} → ${(a.knowledgeTags||[]).join(', ')}`).join('\n')}

請根據本次練習「${topic}」的錯題產生對應章節的重點整理筆記，輸出純JSON（不要Markdown標記）：`;

  loading(true);
  try {
    const noteResult = await callAIFast(prompt);
    const note = {
      userId: state.user.uid,
      title: noteResult.title || topic + ' 學習筆記',
      content: noteResult.content || '無內容',
      knowledgeTags: noteResult.knowledgeTags || [],
      sessionTopic: topic,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    await db.collection('notes').add(note);
    toast('筆記生成完成！', 'success');
    renderNotes();
  } catch(e) {
    console.error(e);
    toast('生成筆記失敗：' + e.message, 'error');
  } finally {
    loading(false);
  }
}

let _lbTab = 'diligence';

async function renderLeaderboard() {
  const el = $('leaderboardContent');
  el.innerHTML = `
    <div class="leaderboard-tabs" id="lbTabs">
      <button class="lb-tab ${_lbTab==='diligence'?'active':''}" onclick="switchLB('diligence')">🔥 勤奮榜</button>
      <button class="lb-tab ${_lbTab==='strength'?'active':''}" onclick="switchLB('strength')">👑 實力榜</button>
      <button class="lb-tab ${_lbTab==='improvement'?'active':''}" onclick="switchLB('improvement')">📈 進步神速</button>
    </div>
    <div id="lbContent"><div class="loading-overlay"><div class="spinner"></div></div></div>`;

  loadLeaderboard(_lbTab);
}

function switchLB(tab) {
  _lbTab = tab;
  qsa('.lb-tab').forEach(t => t.classList.toggle('active', t.textContent.includes(tab === 'diligence' ? '勤奮' : tab === 'strength' ? '實力' : '進步')));
  const el = $('lbContent');
  el.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
  loadLeaderboard(tab);
}

async function loadLeaderboard(type) {
  try {
    const snap = await db.collection('quiz_sessions').get();

    const userStats = {};
    snap.forEach(d => {
      const s = d.data();
      if (!userStats[s.userId]) userStats[s.userId] = { quizzes: 0, correct: 0, total: 0, accuracy: 0 };
      userStats[s.userId].quizzes++;
      userStats[s.userId].correct += s.score || 0;
      userStats[s.userId].total += s.totalQuestions || 0;
    });

    // Get user profiles
    const entries = [];
    for (const [uid, stats] of Object.entries(userStats)) {
      try {
        const pDoc = await db.collection('profiles').doc(uid).get();
        const p = pDoc.data() || {};
        stats.accuracy = stats.total > 0 ? Math.round(stats.correct/stats.total*100) : 0;
        entries.push({ uid, nickname: p.nickname || '用戶', avatarUrl: p.avatarUrl || '', ...stats });
      } catch(e) { /* skip */ }
    }

    let sorted;
    if (type === 'diligence') {
      sorted = entries.sort((a,b) => b.quizzes - a.quizzes);
    } else if (type === 'strength') {
      sorted = entries.filter(e => e.quizzes >= 3).sort((a,b) => b.accuracy - a.accuracy);
    } else {
      // improvement - using a simple heuristic for now
      sorted = entries.filter(e => e.quizzes >= 2).sort((a,b) => b.accuracy - a.accuracy);
    }

    if (sorted.length === 0) {
      $('lbContent').innerHTML = '<div class="card text-center text-muted" style="padding:40px">尚無排行資料</div>';
      return;
    }

    const rankIcons = ['🥇','🥈','🥉'];
    const rankClasses = ['gold','silver','bronze'];

    $('lbContent').innerHTML = sorted.slice(0, 20).map((e, i) => `
      <div class="card" style="margin-bottom:6px;padding:12px 16px">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="lb-rank ${i<3 ? rankClasses[i] : ''}">${i < 3 ? rankIcons[i] : (i+1)}</div>
          <div style="width:32px;height:32px;border-radius:50%;background:var(--gray-100);overflow:hidden;flex-shrink:0">
            ${e.avatarUrl ? `<img src="${e.avatarUrl}" style="width:100%;height:100%;object-fit:cover">` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:.75rem;color:var(--gray-400)">${(e.nickname||'?')[0]}</div>`}
          </div>
          <div style="flex:1;min-width:0">
            <div class="text-sm" style="font-weight:600">${e.nickname}</div>
            <div class="text-xs text-muted">
              ${type === 'diligence' ? `${e.quizzes} 次練習` : type === 'strength' ? `${e.quizzes} 次 · ${e.accuracy}% 正確率` : `${e.accuracy}% 正確率`}
            </div>
          </div>
          <div style="font-weight:700;color:var(--primary)">${type === 'diligence' ? formatScore(e.quizzes*10 + e.correct*5) : e.accuracy}${type === 'diligence' ? '' : '%'}</div>
        </div>
      </div>
    `).join('');
  } catch(e) {
    console.error(e);
    $('lbContent').innerHTML = `<div class="card text-center" style="padding:40px"><p class="text-muted">載入排行榜失敗</p><p class="text-xs text-muted mt-2">${e.message}</p></div>`;
  }
}

let _keyUnmasked = {};

function toggleKeyMask(model, idx) {
  const inp = document.getElementById('keyInput_' + model + '_' + idx);
  const key = model + 'Keys';
  const realKey = state.adminData?.[key]?.[idx] || '';
  const uk = model + '_' + idx;
  if (_keyUnmasked[uk]) {
    inp.value = '•'.repeat(Math.min(40, Math.max(20, realKey.length)));
    inp.dataset.unmasked = '';
    _keyUnmasked[uk] = false;
  } else {
    inp.value = realKey;
    inp.dataset.unmasked = '1';
    _keyUnmasked[uk] = true;
    inp.focus();
  }
}

function toggleApiKeysSection() {
  state._apiKeysExpanded = !state._apiKeysExpanded;
  renderAdmin();
}

// ===== Prompt Helpers =====
function updatePrompt(key, val) {
  if (!state.adminData.prompts) state.adminData.prompts = {};
  state.adminData.prompts[key] = val;
}

// ===== API Key Helpers (multi-model) =====

function getKeyHealthModel(model, idx) {
  const h = keyHealth[model + '_' + idx];
  if (!h) return '未儲存';
  if (h.status === 'cooldown') return '冷卻中';
  return 'healthy';
}
function keyHealthClass(model, idx) {
  const s = getKeyHealthModel(model, idx);
  if (s === 'healthy') return 'tag-green';
  if (s === '未儲存') return 'tag-yellow';
  return 'tag-red';
}

function addKeyModel(model) {
  const key = model + 'Keys';
  if (!state.adminData[key]) state.adminData[key] = [];
  state.adminData[key] = [...state.adminData[key], ''];
  renderAdmin();
}

function bulkAddKeys(model) {
  const el = document.getElementById('bulkKeys_' + model);
  if (!el || !el.value.trim()) { toast('請先貼上 API Key（每行一組）', 'error'); return; }
  const keys = el.value.split('\n').map(s => s.trim()).filter(Boolean);
  if (keys.length === 0) { toast('未偵測到有效的 Key', 'error'); return; }
  const key = model + 'Keys';
  if (!state.adminData[key]) state.adminData[key] = [];
  state.adminData[key] = [...state.adminData[key], ...keys];
  el.value = '';
  renderAdmin();
  toast('已新增 ' + keys.length + ' 組 ' + model + ' Key', 'success');
}

function updateKeyModel(model, idx, val) {
  const key = model + 'Keys';
  if (state.adminData[key]) state.adminData[key][idx] = val;
}

function removeKeyModel(model, idx) {
  const key = model + 'Keys';
  if (state.adminData[key]) state.adminData[key].splice(idx, 1);
  renderAdmin();
}

function toggleFeature(key) {
  if (state.adminData?.features) state.adminData.features[key] = !state.adminData.features[key];
  renderAdmin();
}
function toggleServerProxy() {
  state.useServerProxy = !state.useServerProxy;
  localStorage.setItem('useServerProxy', state.useServerProxy ? '1' : '0');
  renderAdmin();
  toast(state.useServerProxy ? '已啟用 Server Proxy' : '已停用 Server Proxy', 'info');
}

function toggleMaintenance() {
  if (state.adminData) state.adminData.maintenanceMode = !state.adminData.maintenanceMode;
  renderAdmin();
}

async function saveAdminConfig() {
  loading(true);
  try {
    const data = state.adminData || {};
    await db.collection('admin_config').doc('settings').set(data, { merge: true });
    ['gemini', 'groq', 'openrouter'].forEach(model => {
      const key = model + 'Keys';
      if (data[key]) KEY_POOLS[model] = data[key].filter(k => k.trim());
    });
    rebuildKeyHealth();
    _keyCursor = { groq: 0, openrouter: 0 };
    toast('設定已儲存，所有 API Key 已同步', 'success');
  } catch(e) {
    toast('儲存失敗：' + e.message, 'error');
  } finally {
    loading(false);
  }
}

async function syncKeysFromFirestore() {
  loading(true);
  try {
    const doc = await db.collection('admin_config').doc('settings').get();
    if (doc.exists) {
      const data = doc.data();
      ['gemini', 'groq', 'openrouter'].forEach(model => {
        const key = model + 'Keys';
        if (data[key] && data[key].length > 0) KEY_POOLS[model] = data[key].filter(k => k.trim());
      });
      rebuildKeyHealth();
      if (!data.geminiKeys || data.geminiKeys.length === 0) data.geminiKeys = [...KEY_POOLS.gemini];
      if (!data.groqKeys || data.groqKeys.length === 0) data.groqKeys = [...KEY_POOLS.groq];
      if (!data.openrouterKeys || data.openrouterKeys.length === 0) data.openrouterKeys = [...KEY_POOLS.openrouter];
      state.adminData = data;
      toast('已從 Firestore 重新同步', 'success');
    }
  } catch(e) { toast('同步失敗', 'error'); }
  loading(false);
  renderAdmin();
}

// ===== Curriculum CRUD =====

function addSubject() {
  if (!state.adminCurriculum) return;
  const id = 'subj' + (state.adminCurriculum.subjects.length + 1);
  state.adminCurriculum.subjects.push({ id, label: '新科目', icon: '📚', units: [] });
  renderAdmin();
}

function deleteSubject(si) {
  if (!state.adminCurriculum || !confirm('確定刪除「' + state.adminCurriculum.subjects[si]?.label + '」？')) return;
  state.adminCurriculum.subjects.splice(si, 1);
  renderAdmin();
}

function addUnit(si) {
  if (!state.adminCurriculum) return;
  const s = state.adminCurriculum.subjects[si];
  if (!s) return;
  const id = 'U' + (s.units.length + 1);
  s.units.push({ id, label: '新單元', subUnits: [] });
  renderAdmin();
}

function deleteUnit(si, ui) {
  if (!state.adminCurriculum) return;
  const s = state.adminCurriculum.subjects[si];
  if (!s || !confirm('確定刪除「' + s.units[ui]?.label + '」？')) return;
  s.units.splice(ui, 1);
  renderAdmin();
}

async function saveCurriculum() {
  if (!state.adminCurriculum) return;
  loading(true);
  try {
    const data = JSON.parse(JSON.stringify(state.adminCurriculum));
    await db.collection('admin_config').doc('curriculum').set(data);
    curriculumData = data;
    toast('課綱已儲存', 'success');
  } catch(e) {
    toast('儲存失敗：' + e.message, 'error');
  } finally {
    loading(false);
  }
}

async function toggleUserRole(uid, currentRole) {
  if (!uid) return;
  const newRole = currentRole === 'admin' ? 'user' : 'admin';
  const action = newRole === 'admin' ? '設為管理員' : '降級為用戶';
  if (!confirm(`確定將此用戶${action}？`)) return;
  loading(true);
  try {
    await db.collection('profiles').doc(uid).update({ role: newRole });
    toast(`已${action}`, 'success');
    renderAdmin();
  } catch(e) {
    toast('操作失敗：' + e.message, 'error');
  } finally {
    loading(false);
  }
}

/* ============================================================
   PROFILE
   ============================================================ */
function renderProfile() {
  const el = $('profileContent');
  if (!state.user) { el.innerHTML = '<div class="text-center text-muted" style="padding:40px">請先登入</div>'; return; }

  const p = state.profile || {};
  const avatarUrl = p.avatarUrl || state.user.photoURL;
  const nickname = p.nickname || state.user.displayName || state.user.email?.split('@')[0] || '用戶';
  el.innerHTML = `
    <div class="card" style="max-width:440px;margin:0 auto">
      <div class="text-center" style="margin-bottom:20px">
        ${avatarUrl
          ? `<img src="${avatarUrl}" class="profile-avatar-lg" style="width:72px;height:72px;border-radius:50%;object-fit:cover">`
          : `<div style="width:72px;height:72px;border-radius:50%;background:var(--gray-200);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.5rem;color:var(--gray-400)">${nickname[0]}</div>`}
        <h2 style="margin-bottom:0">個人設定</h2>
        <p class="text-sm text-muted">設定用於筆記浮水印與排行榜</p>
      </div>
      <div class="input-group">
        <label class="input-label">暱稱（顯示名稱）</label>
        <input class="input" id="pfNickname" value="${nickname}" placeholder="例如：學霸小明">
      </div>
      <div class="input-group">
        <label class="input-label">全名（用於證書）</label>
        <input class="input" id="pfFullname" value="${p.fullName || state.user.displayName || ''}" placeholder="您的真實姓名">
      </div>
      <div class="input-group">
        <label class="input-label">電子郵件</label>
        <input class="input" value="${state.user.email || ''}" disabled style="background:var(--gray-50)">
      </div>
      <button class="btn btn-primary btn-block" onclick="saveProfile()">💾 儲存設定</button>
    </div>`;
}

async function saveProfile() {
  const nickname = $('pfNickname')?.value.trim();
  const fullName = $('pfFullname')?.value.trim();
  if (!nickname) { toast('請輸入暱稱', 'error'); return; }
  try {
    await updateProfile({ nickname, fullName });
    toast('資料已更新', 'success');
    updateNav();
  } catch(e) { toast('更新失敗', 'error'); }
}

/* ============================================================
   INIT（等待課綱載入後啟動）
   ============================================================ */
if (localStorage.getItem('useServerProxy') === '1') state.useServerProxy = true;

if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

_curriculumLoadPromise.then(() => {
  initDarkMode();
  handleRoute();
});
</script>
